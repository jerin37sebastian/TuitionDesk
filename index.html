<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TuitionDesk — Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="css/style.css"/>
  <style>
    body { display: flex; align-items: center; justify-content: center; padding: 24px 20px; padding-bottom: 24px; min-height: 100vh; }
    .login-wrap { width: 100%; max-width: 400px; }
    .login-logo { text-align: center; margin-bottom: 36px; }
    .login-logo .icon { width: 60px; height: 60px; background: var(--blue); border-radius: 18px; display: inline-flex; align-items: center; justify-content: center; font-size: 28px; margin-bottom: 14px; }
    .login-logo h1 { font-size: 24px; font-weight: 700; color: var(--blue); }
    .login-logo p { font-size: 14px; color: var(--muted); margin-top: 4px; }
    .login-card { background: var(--white); border-radius: 16px; border: 1px solid var(--border); padding: 24px; }
    .login-card h2 { font-size: 18px; font-weight: 700; margin-bottom: 4px; }
    .login-card .sub { font-size: 13px; color: var(--muted); margin-bottom: 22px; }
    .error-msg { background: var(--red-light); color: var(--red); font-size: 13px; padding: 10px 14px; border-radius: 8px; margin-bottom: 14px; display: none; }
    .hint { font-size: 12px; color: var(--muted); text-align: center; margin-top: 14px; }
    .hint span { color: var(--blue); font-weight: 600; }
  </style>
</head>
<body>
  <div class="login-wrap">
    <div class="login-logo">
      <div class="icon">📚</div>
      <h1>TuitionDesk</h1>
      <p>Manage your tuition center easily</p>
    </div>

    <div class="login-card">
      <h2>Welcome back 👋</h2>
      <p class="sub">Sign in to your account</p>

      <div class="error-msg" id="errorMsg">Incorrect email or password.</div>

      <div class="form-group">
        <label>Email</label>
        <input type="email" id="email" placeholder="admin@tuitiondesk.in"/>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="••••••••"/>
      </div>

      <button class="btn btn-primary" onclick="doLogin()">Sign In</button>

      <p class="hint">Demo: <span>admin@demo.com</span> / <span>123456</span></p>
    </div>
  </div>

  <script>
    function doLogin() {
      const email = document.getElementById('email').value.trim();
      const pass  = document.getElementById('password').value.trim();
      const err   = document.getElementById('errorMsg');

      if (email === 'admin@demo.com' && pass === '123456') {
        window.location.href = 'dashboard.html';
      } else {
        err.style.display = 'block';
        setTimeout(() => err.style.display = 'none', 3000);
      }
    }

    document.getElementById('password').addEventListener('keydown', e => {
      if (e.key === 'Enter') doLogin();
    });
  </script>
</body>
</html>
